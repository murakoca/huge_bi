apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-powerbi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mini-powerbi
  template:
    metadata:
      labels:
        app: mini-powerbi
    spec:
      containers:
      - name: app
        image: your-registry/mini-powerbi:latest
        ports:
        - containerPort: 8050
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: mini-powerbi-secrets
              key: secret-key